// ─────────────────────────────────────────────
// ONBOARDING
// ─────────────────────────────────────────────
function OnboardingFlow({ onComplete }) {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({
    name:"", email:"", campus:"Hyderabad", section:"B",
    homeCity:"", undergrad:"", relationshipStatus:"Unmarried",
    prevRole:"", prevCompany:"", preISBIndustry:"", yearsExp:"",
    targetIndustry:"", careerGoals:[], skills:[],
    hobbies:[], bio:"",
  });

  const set = (k,v) => setData(p=>({...p,[k]:v}));
  const toggleArr = (k,v,max) => setData(p=>({
    ...p,
    [k]: (p[k]||[]).includes(v)
      ? (p[k]||[]).filter(x=>x!==v)
      : (p[k]||[]).length < max ? [...(p[k]||[]),v] : (p[k]||[])
  }));

  // TARGET INDUSTRY — where you want to work (sector/employer type)
  const INDUSTRIES_LIST = [
    "Consulting & Strategy","Investment Banking","Private Equity","Venture Capital",
    "Technology","BFSI / Financial Services","FMCG & Consumer","Healthcare & Pharma",
    "Real Estate","Manufacturing","Media & Entertainment","Government / PSU",
    "Social Impact / NGO","Energy","Education",
  ];

  // CAREER GOALS — what you want to do or become (role/function aspiration)
  const CAREER_GOALS_LIST = [
    "General Management","Product Management","Strategy & Consulting",
    "Entrepreneurship","Chief of Staff / Founder's Office","Sales & Marketing",
    "Operations & Supply Chain","Investment Management","Corporate Finance",
    "Technology & Engineering","Family Business","Social Impact",
    "Human Resources","Healthcare Management",
  ];

  const SKILLS_LIST = ["Financial Modelling","Valuation","M&A","Strategy","Case Interviews","Business Development","Market Research","Python","SQL","Excel","Data Viz","Public Speaking","Leadership","Negotiation","Operations","Product Management","Due Diligence","Corporate Finance","Storytelling","Team Management","Project Management"];
  const HOBBIES_LIST = ["Cricket","Football","Tennis","Running","Cycling","Swimming","Chess","Poker","Board Games","Reading","Music","Photography","Travel","Cooking","Gaming","Yoga","Gym","Badminton","Squash"];

  const STEPS_META = [
    { heading:"Let's get you set up 👋",           sub:"Takes about 2 minutes. The more you share, the better your matches." },
    { heading:"Tell us about yourself ✨",        sub:"Your batchmates want to know the real you" },
    { heading:"What's your story before ISB? 💼", sub:"Your background is what makes you unique here" },
    { heading:"Where are you headed? 🎯",          sub:"Help us find the right people for your journey" },
    { heading:"What's your crowd? 🤝",             sub:"Pick activities that drive your events and matches" },
  ];

  const sectionOptions = data.campus === "Hyderabad" ? ["A","B","C","D","E","F"] : ["G","H","I","J","K","L"];
  const emailOk = true; // prototype mode — no email gate

  const canContinue = [
    (data.name||"").trim(),
    data.campus && data.section && (data.homeCity||"").trim() && (data.undergrad||"").trim(),
    (data.prevRole||"").trim() && (data.prevCompany||"").trim() && data.preISBIndustry && data.yearsExp,
    data.targetIndustry && (data.careerGoals||[]).length > 0,
    true,
  ][step];

  const stepContent = [
    // Step 0 — Verification
    <div key="s0">
      <div style={{ marginBottom:18 }}>
        <label style={{ fontSize:11, color:"rgba(255,255,255,0.6)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", display:"block", marginBottom:7 }}>Your ISB Email</label>
        <div style={{ position:"relative" }}>
          <input type="email" value={data.email} onChange={e=>set("email",e.target.value)} placeholder="yourname@isb.edu"
            style={{ width:"100%", padding:"13px 16px", border:"1.5px solid rgba(255,255,255,0.2)", borderRadius:12, fontSize:14, outline:"none", fontFamily:"inherit", color:"#fff", background:"rgba(255,255,255,0.1)", boxSizing:"border-box" }}
            onFocus={e=>e.target.style.borderColor="rgba(255,255,255,0.6)"}
            onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.2)"}/>
        </div>
        <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)", marginTop:7 }}>Check your ISB inbox — one click and you're in</div>
      </div>

      <OBField label="Full Name" value={data.name} onChange={v=>set("name",v)} placeholder="As it appears on your ISB ID"/>



      <div style={{ background:"rgba(255,255,255,0.06)", borderRadius:12, padding:"12px 16px", borderLeft:"3px solid rgba(255,255,255,0.15)" }}>
        <div style={{ fontSize:12, color:"rgba(255,255,255,0.45)", lineHeight:1.7 }}>
          🔒 We don't share data with ISB administration.<br/>
          This is <b style={{color:"rgba(255,255,255,0.65)"}}>student-built and student-run.</b>
        </div>
      </div>
    </div>,

    // Step 1 — Identity
    <div key="s1">
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
        <div>
          <label style={{ fontSize:11, color:"rgba(255,255,255,0.6)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", display:"block", marginBottom:7 }}>Campus</label>
          <div style={{ display:"flex", gap:8 }}>
            {["Hyderabad","Mohali"].map(c=>(
              <button key={c} onClick={()=>{ set("campus",c); set("section",c==="Hyderabad"?"A":"G"); }}
                style={{ flex:1, padding:"10px 8px", border:`1.5px solid ${data.campus===c?"rgba(255,255,255,0.8)":"rgba(255,255,255,0.25)"}`, borderRadius:10, background:data.campus===c?"rgba(255,255,255,0.2)":"transparent", color:data.campus===c?"#fff":"rgba(255,255,255,0.5)", cursor:"pointer", fontSize:12, fontWeight:data.campus===c?700:500, fontFamily:"inherit" }}>{c}</button>
            ))}
          </div>
        </div>
        <div>
          <label style={{ fontSize:11, color:"rgba(255,255,255,0.6)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", display:"block", marginBottom:7 }}>Section</label>
          <select value={data.section} onChange={e=>set("section",e.target.value)}
            style={{ width:"100%", padding:"10px 14px", border:"1.5px solid rgba(255,255,255,0.2)", borderRadius:10, fontSize:13, outline:"none", fontFamily:"inherit", color:"#fff", background:"rgba(255,255,255,0.1)", cursor:"pointer" }}>
            {sectionOptions.map(s=><option key={s} value={s} style={{color:"#333"}}>{s}</option>)}
          </select>
        </div>
      </div>
      <OBField label="Home City" value={data.homeCity} onChange={v=>set("homeCity",v)} placeholder="e.g. Mumbai, Delhi, Bangalore"/>
      <OBField label="Undergrad Institution" value={data.undergrad} onChange={v=>set("undergrad",v)} placeholder="e.g. IIT Bombay, SRCC, BITS Pilani"/>
      <div style={{ marginBottom:14 }}>
        <label style={{ fontSize:11, color:"rgba(255,255,255,0.6)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", display:"block", marginBottom:8 }}>
          Relationship Status <span style={{fontWeight:400,textTransform:"none",fontSize:11}}>— optional</span>
        </label>
        <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
          {["Unmarried","Married","In a relationship","Prefer not to disclose"].map(s=>(
            <button key={s} onClick={()=>set("relationshipStatus",s)}
              style={{ padding:"6px 13px", border:`1.5px solid ${data.relationshipStatus===s?"rgba(255,255,255,0.8)":"rgba(255,255,255,0.2)"}`, borderRadius:22, background:data.relationshipStatus===s?"rgba(255,255,255,0.18)":"transparent", color:data.relationshipStatus===s?"#fff":"rgba(255,255,255,0.5)", cursor:"pointer", fontSize:12, fontWeight:data.relationshipStatus===s?700:500, fontFamily:"inherit" }}>{s}</button>
          ))}
        </div>
      </div>
    </div>,

    // Step 2 — Pre-ISB
    <div key="s2">
      <OBField label="Your Role Before ISB" value={data.prevRole} onChange={v=>set("prevRole",v)} placeholder="e.g. Business Analyst, Product Manager"/>
      <OBField label="Company" value={data.prevCompany} onChange={v=>set("prevCompany",v)} placeholder="e.g. McKinsey, Google, Goldman Sachs"/>
      <OBField label="Years of Experience" value={data.yearsExp} onChange={v=>set("yearsExp",v)} placeholder="e.g. 4" type="number"/>
      <div style={{ marginBottom:14 }}>
        <label style={{ fontSize:11, color:"rgba(255,255,255,0.6)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", display:"block", marginBottom:8 }}>Industry</label>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
          {INDUSTRIES_LIST.map(ind=>(
            <button key={ind} onClick={()=>set("preISBIndustry",ind)}
              style={{ padding:"6px 13px", border:`1.5px solid ${data.preISBIndustry===ind?"rgba(255,255,255,0.85)":"rgba(255,255,255,0.2)"}`, borderRadius:20, background:data.preISBIndustry===ind?"rgba(255,255,255,0.2)":"transparent", color:data.preISBIndustry===ind?"#fff":"rgba(255,255,255,0.5)", cursor:"pointer", fontSize:12, fontWeight:data.preISBIndustry===ind?700:500, fontFamily:"inherit", transition:"all 0.12s" }}>{ind}</button>
          ))}
        </div>
      </div>
    </div>,

    // Step 3 — Where headed
    <div key="s3">
      {/* Block A — Where you're headed */}
      <div style={{ background:"rgba(255,255,255,0.07)", borderRadius:14, border:"1.5px solid rgba(255,255,255,0.12)", padding:"14px 16px", marginBottom:12 }}>
        <div style={{ fontSize:11, fontWeight:800, color:"rgba(255,255,255,0.85)", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:12, display:"flex", alignItems:"center", gap:6 }}>
          <span>🎯</span> Where you're headed
        </div>

        <div style={{ marginBottom:0 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <label style={{ fontSize:12, color:"rgba(255,255,255,0.65)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em" }}>Target Industry</label>
            {!data.targetIndustry
              ? <span style={{ fontSize:10, color:"rgba(255,175,0,0.9)", fontWeight:700, background:"rgba(255,175,0,0.12)", padding:"2px 8px", borderRadius:6 }}>Required ✱</span>
              : <span style={{ fontSize:11, color:"#34D399", fontWeight:700 }}>✓ {data.targetIndustry}</span>}
          </div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
            {INDUSTRIES_LIST.map(ind=>{
              const active = data.targetIndustry===ind;
              return <button key={ind} onClick={()=>set("targetIndustry",ind)}
                style={{ padding:"7px 14px", border:`1.5px solid ${active?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.16)"}`, borderRadius:22, background:active?"rgba(255,255,255,0.2)":"transparent", color:active?"#fff":"rgba(255,255,255,0.45)", cursor:"pointer", fontSize:13, fontWeight:active?800:500, fontFamily:"inherit", transition:"all 0.12s" }}>{ind}</button>;
            })}
          </div>
        </div>

        <div style={{ height:1, background:"rgba(255,255,255,0.1)", margin:"14px 0" }}/>

        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <label style={{ fontSize:12, color:"rgba(255,255,255,0.65)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em" }}>Career Goals</label>
            <span style={{ fontSize:11, color:(data.careerGoals||[]).length>=3?"#34D399":"rgba(255,255,255,0.35)", fontWeight:700 }}>{(data.careerGoals||[]).length}/3</span>
          </div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
            {CAREER_GOALS_LIST.map(g=>{
              const active=(data.careerGoals||[]).includes(g);
              const maxed=(data.careerGoals||[]).length>=3&&!active;
              return <button key={g} onClick={()=>toggleArr("careerGoals",g,3)}
                style={{ padding:"8px 15px", border:`1.5px solid ${active?"rgba(255,255,255,0.85)":"rgba(255,255,255,0.2)"}`, borderRadius:22, background:active?"rgba(255,255,255,0.2)":"transparent", color:active?"#fff":maxed?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.6)", cursor:maxed?"not-allowed":"pointer", fontSize:13, fontWeight:active?800:500, fontFamily:"inherit", transition:"all 0.12s", opacity:maxed?0.5:1 }}>{g}</button>;
            })}
          </div>
        </div>
      </div>

      {/* Block B — What you bring */}
      <div style={{ background:"rgba(255,255,255,0.04)", borderRadius:14, border:"1.5px solid rgba(255,255,255,0.08)", padding:"14px 16px" }}>
        <div style={{ fontSize:11, fontWeight:800, color:"rgba(255,255,255,0.7)", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:12, display:"flex", alignItems:"center", gap:6 }}>
          <span>⚡</span> What you bring
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <label style={{ fontSize:12, color:"rgba(255,255,255,0.65)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em" }}>Skills</label>
          <span style={{ fontSize:11, color:(data.skills||[]).length>=3?"#34D399":"rgba(255,255,255,0.35)", fontWeight:700 }}>{(data.skills||[]).length}/3</span>
        </div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
          {SKILLS_LIST.map(s=>{
            const active=(data.skills||[]).includes(s);
            const maxed=(data.skills||[]).length>=3&&!active;
            return <button key={s} onClick={()=>toggleArr("skills",s,3)}
              style={{ padding:"8px 15px", border:`1.5px solid ${active?"rgba(255,255,255,0.85)":"rgba(255,255,255,0.2)"}`, borderRadius:22, background:active?"rgba(255,255,255,0.2)":"transparent", color:active?"#fff":maxed?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.6)", cursor:maxed?"not-allowed":"pointer", fontSize:13, fontWeight:active?800:500, fontFamily:"inherit", transition:"all 0.12s", opacity:maxed?0.5:1 }}>{s}</button>;
          })}
        </div>
      </div>
    </div>,

    // Step 4 — Crowd
    <div key="s4">
      <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:12 }}>
        <span style={{ fontSize:13, color:(data.hobbies||[]).length>=10?"#34D399":"rgba(255,255,255,0.4)", fontWeight:800, background:"rgba(255,255,255,0.08)", padding:"4px 12px", borderRadius:20 }}>{(data.hobbies||[]).length}/10 selected</span>
      </div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:7, marginBottom:16 }}>
        {HOBBIES_LIST.map(h=>{
          const active=(data.hobbies||[]).includes(h);
          const maxed=(data.hobbies||[]).length>=10&&!active;
          return <button key={h} onClick={()=>toggleArr("hobbies",h,10)}
            style={{ padding:"8px 15px", border:`1.5px solid ${active?"rgba(255,255,255,0.85)":"rgba(255,255,255,0.2)"}`, borderRadius:22, background:active?"rgba(255,255,255,0.18)":"transparent", color:active?"#fff":maxed?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.55)", cursor:maxed?"not-allowed":"pointer", fontSize:13, fontWeight:active?700:500, fontFamily:"inherit", transition:"all 0.12s" }}>{h}</button>;
        })}
      </div>
      <div>
        <label style={{ fontSize:11, color:"rgba(255,255,255,0.6)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", display:"block", marginBottom:7 }}>
          A quick bio <span style={{fontWeight:400,textTransform:"none"}}>— optional</span>
        </label>
        <textarea value={data.bio||""} onChange={e=>set("bio",e.target.value)} placeholder="Tell your batchmates who you are in a line or two..." rows={3}
          style={{ width:"100%", padding:"12px 14px", border:"1.5px solid rgba(255,255,255,0.2)", borderRadius:12, fontSize:13, outline:"none", fontFamily:"inherit", color:"#fff", background:"rgba(255,255,255,0.1)", boxSizing:"border-box", resize:"none" }}
          onFocus={e=>e.target.style.borderColor="rgba(255,255,255,0.6)"}
          onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.2)"}/>
      </div>
    </div>,
  ];

  const isLast = step === 4;

  return (
    <div style={{ minHeight:"100vh", background:`linear-gradient(145deg,#003A8F,#1E3A8A,#312E81)`, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px", fontFamily:"'Sora',sans-serif" }}>
      <div style={{ position:"fixed", top:-100, right:-100, width:400, height:400, borderRadius:"50%", background:"rgba(255,255,255,0.04)", pointerEvents:"none" }}/>
      <div style={{ position:"fixed", bottom:-80, left:-80, width:300, height:300, borderRadius:"50%", background:"rgba(255,255,255,0.03)", pointerEvents:"none" }}/>

      <div style={{ width:"100%", maxWidth:480 }}>
        {/* Logo */}
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:30, justifyContent:"center" }}>
          <div style={{ width:36, height:36, borderRadius:10, background:"linear-gradient(135deg,#60A5FA,#A78BFA)", display:"flex", alignItems:"center", justifyContent:"center" }}>
            <span style={{ color:"#fff", fontSize:17, fontWeight:900, fontFamily:"'Sora',sans-serif" }}>N</span>
          </div>
          <div style={{ color:"#fff", fontWeight:900, fontSize:18, fontFamily:"'Sora',sans-serif", letterSpacing:"-0.01em" }}>Pulse</div>
        </div>

        {/* Card */}
        <div style={{ background:"rgba(255,255,255,0.08)", backdropFilter:"blur(20px)", borderRadius:22, border:"1.5px solid rgba(255,255,255,0.15)", padding:"30px 26px", boxShadow:"0 24px 80px rgba(0,0,0,0.3)" }}>
          <div style={{ marginBottom:22 }}>

            <div style={{ fontSize:13, color:"rgba(255,255,255,0.55)", lineHeight:1.5 }}>
              {STEPS_META[step].sub}
            </div>
          </div>

          <div key={step} style={{ animation:"cardIn 0.25s ease both" }}>
            {stepContent[step]}
          </div>

          <button onClick={()=>{ if(isLast){ onComplete(data); } else setStep(s=>s+1); }} disabled={!canContinue}
            style={{ width:"100%", padding:"13px", border:"none", borderRadius:13, background:canContinue?"linear-gradient(135deg,#60A5FA,#3B82F6)":"rgba(255,255,255,0.1)", color:canContinue?"#fff":"rgba(255,255,255,0.3)", cursor:canContinue?"pointer":"not-allowed", fontWeight:800, fontSize:15, fontFamily:"'Sora',sans-serif", boxShadow:canContinue?"0 4px 20px rgba(59,130,246,0.4)":"none", marginBottom:12, marginTop:20, transition:"all 0.2s", letterSpacing:"-0.01em" }}
            onMouseEnter={e=>{ if(canContinue) e.currentTarget.style.transform="translateY(-1px)"; }}
            onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
            {isLast ? "Enter Pulse →" : "Continue →"}
          </button>

          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            {step > 0
              ? <button onClick={()=>setStep(s=>s-1)} style={{ fontSize:12, color:"rgba(255,255,255,0.4)", background:"none", border:"none", cursor:"pointer", fontFamily:"inherit", fontWeight:600 }}>← Back</button>
              : <div/>}
            {isLast && (
              <button onClick={()=>onComplete(data)} style={{ fontSize:12, color:"rgba(255,255,255,0.35)", background:"none", border:"none", cursor:"pointer", fontFamily:"inherit", fontWeight:600 }}>Skip for now</button>
            )}
          </div>
        </div>

        {/* Progress dots */}
        <div style={{ display:"flex", justifyContent:"center", gap:8, marginTop:22 }}>
          {[0,1,2,3,4].map(i=>(
            <div key={i} style={{ width:i===step?24:8, height:8, borderRadius:4, background:i===step?"#60A5FA":i<step?"rgba(255,255,255,0.5)":"rgba(255,255,255,0.2)", transition:"all 0.3s cubic-bezier(0.4,0,0.2,1)" }}/>
          ))}
        </div>
        <div style={{ textAlign:"center", marginTop:16, fontSize:11, color:"rgba(255,255,255,0.3)" }}>
          🔒 Your data is private and only visible to your ISB batch
        </div>
      </div>
    </div>
  );
}


function OBField({ label, value, onChange, placeholder, type="text" }) {
  return (
    <div style={{ marginBottom:14 }}>
      <label style={{ display:"block", fontSize:11, color:"rgba(255,255,255,0.6)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:6 }}>{label}</label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{ width:"100%", padding:"10px 14px", border:"1.5px solid rgba(255,255,255,0.2)", borderRadius:10, background:"rgba(255,255,255,0.08)", color:"#fff", fontSize:13, fontFamily:"inherit", outline:"none", boxSizing:"border-box" }}
        onFocus={e=>e.target.style.borderColor="rgba(255,255,255,0.6)"}
        onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.2)"}/>
    </div>
  );
}

// ─────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────
function App() {
  const [isOnboarded, setIsOnboarded] = useState(false);
  const [currentUser, setCurrentUser] = useState(CURRENT_USER);
  const [activePage, setActivePage] = useState("events");
  const [profiles, setProfiles] = useState(SAMPLE_PROFILES);
  const [selectedProfile, setSelectedProfile] = useState(null);
  const [searchQuery, setSearchQuery] = useState("");

  useEffect(() => {
    const link = document.createElement("link");
    link.href = "https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&display=swap";
    link.rel = "stylesheet";
    document.head.appendChild(link);
    document.body.style.margin = "0";
    document.body.style.background = "#F8FAFC";
  }, []);

  const handleOnboardingComplete = (data) => {
    const user = {
      ...CURRENT_USER,
      name:       data.name       || CURRENT_USER.name,
      section:    data.section    || CURRENT_USER.section,
      campus:     data.campus     || "Hyderabad",
      prevRole:   data.prevRole   || CURRENT_USER.prevRole,
      prevCompany:data.prevCompany|| CURRENT_USER.prevCompany,
      industry:   data.industry   || CURRENT_USER.industry,
      yearsExp:   parseInt(data.yearsExp)||CURRENT_USER.yearsExp,
      careerGoals:data.careerGoals.length>0 ? data.careerGoals : CURRENT_USER.careerGoals,
      skills:     data.skills.length>0     ? data.skills     : CURRENT_USER.skills,
      hobbies:    data.hobbies.length>0    ? data.hobbies    : CURRENT_USER.hobbies,
      undergrad:  data.undergrad  || CURRENT_USER.undergrad,
      bio:        data.bio        || CURRENT_USER.bio,
      photo:      null,
    };
    setCurrentUser(user);
    setProfiles(prev => prev.map(p => ({ ...p, _rescored: calculateCompatibility(p, user) })));
    setIsOnboarded(true);
  };

  if (!isOnboarded) return <OnboardingFlow onComplete={handleOnboardingComplete}/>;

  const handleViewProfile = (profile) => {
    setSelectedProfile({ ...profile, _backPage: activePage });
    setActivePage("profileDetail");
  };

  const handleUpdateProfile = (updatedProfile) => {
    setProfiles(prev => prev.map(p => p.id === updatedProfile.id ? updatedProfile : p));
    setSelectedProfile(updatedProfile);
  };

  const handleStatusChange = (id, newStatus) => {
    setProfiles(prev => prev.map(p => p.id === id ? { ...p, contactStatus: newStatus } : p));
  };

  const safeBack = selectedProfile?._backPage || "discover";

  const renderPage = () => {
    if (activePage === "profileDetail" && selectedProfile) {
      return <ProfileDetailPage
        profile={profiles.find(p=>p.id===selectedProfile.id)||selectedProfile}
        onBack={()=>setActivePage(safeBack)}
        onUpdate={handleUpdateProfile}
        currentUser={currentUser}/>;
    }
    switch (activePage) {
      case "events":  return <EventsPage currentUser={currentUser} setActivePage={setActivePage}/>;
      case "discover": return <DiscoverPage profiles={profiles} setProfiles={setProfiles} onViewProfile={handleViewProfile} searchQuery={searchQuery} currentUser={currentUser}/>;
      case "network": return <MyNetworkPage profiles={profiles} onViewProfile={handleViewProfile}/>;
      case "profile": return <MyProfilePage currentUser={currentUser} setCurrentUser={setCurrentUser}/>;
      case "settings": return <SettingsPage/>;
      default: return null;
    }
  };

  return (
    <div style={{ display:"flex", minHeight:"100vh", background:"#F8FAFC", fontFamily:"'Sora',sans-serif" }}>
      <Sidebar activePage={activePage==="profileDetail"?safeBack:activePage} setActivePage={pg=>{setActivePage(pg);setSelectedProfile(null);}} currentUser={currentUser}/>
      <div style={{ marginLeft:220, flex:1, display:"flex", flexDirection:"column", minHeight:"100vh" }}>
        <TopBar searchQuery={searchQuery} setSearchQuery={setSearchQuery} activePage={activePage==="profileDetail"?"discover":activePage} currentUser={currentUser}/>
        <main style={{ flex:1, overflowY:"auto" }}>{renderPage()}</main>
      </div>
    </div>
  );
}


    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
